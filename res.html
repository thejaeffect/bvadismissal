<!DOCTYPE html>
<html>
<head>
  <title>RES Bus Dismissal</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* Setting this to black so any remaining tiny slivers blend in perfectly */
      background-color: #000000; 
    }
    
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      
      /* THE ZOOM TRICK */
      /* 1.25 equals a 25% zoom. */
      transform: scale(1.25); 
      
      /* This tells the browser to zoom from the top left corner */
      transform-origin: top left; 
    }
  </style>
</head>

<body>
  <iframe 
    id="sheetFrame"
    src="https://docs.google.com/spreadsheets/d/17GIAVZ2I8xfgC8BJISBw-Txe3exPO_7odPa4XNxJjTY/htmlembed?widget=false&headers=false">
  </iframe>
  
  <script>
    // This script forces the iframe to reload just the sheet data every 15 seconds.
    setInterval(function() {
      var iframe = document.getElementById('sheetFrame');
      var baseUrl = "https://docs.google.com/spreadsheets/d/17GIAVZ2I8xfgC8BJISBw-Txe3exPO_7odPa4XNxJjTY/htmlembed?widget=false&headers=false";
      
      // The '&t=' + timestamp trick forces the player to fetch new data 
      // instead of loading an old, cached version of the sheet.
      iframe.src = baseUrl + '&t=' + new Date().getTime();
    }, 15000); // 15000 milliseconds = 15 seconds. Change this number if you want it faster or slower.
  </script>
</body>
</html>
