<!DOCTYPE html>
<html>
<head>
  <title>RES Bus Dismissal</title>
  <style>
    /* This CSS ensures the iframe takes up the exact size of the TV screen 
       with no white margins, borders, or accidental scrollbars. */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>

<body>
  <iframe 
    id="sheetFrame" 
    src="https://docs.google.com/spreadsheets/d/17GIAVZ2I8xfgC8BJISBw-Txe3exPO_7odPa4XNxJjTY/htmlembed?widget=true&headers=false">
  </iframe>
</body>
</html>
